<div class="mainDiv">
    <div class="navBar">
        <app-nav-bar></app-nav-bar>
    </div>
    <div class="editProfile">
        <div>
            <h1>Edit Profile</h1>
        </div>
        <form class="editProfileForm">
            <table class="editNameTable">
                <tr>
                    <td>
                        <mat-form-field appearance="outline" class="example-full-width">
                            <mat-label>First Name</mat-label>
                            <input matInput placeholder="Ex. John">
                        </mat-form-field>
                    </td>
                    <td>
                        <mat-form-field appearance="outline" class="example-full-width">
                            <mat-label>Last Name</mat-label>
                            <input matInput placeholder="Ex. Doe">
                        </mat-form-field>
                    </td>
                </tr>
            </table>
            <table class="editResidenceTable">
                <tr>
                    <td>
                        <mat-form-field appearance="outline">
                            <mat-label>City</mat-label>
                            <input matInput placeholder="Ex. San Francisco">
                        </mat-form-field>
                    </td>
                    <td>
                        <mat-form-field appearance="outline">
                            <mat-label>State</mat-label>
                            <input matInput placeholder="Ex. California">
                        </mat-form-field>
                    </td>
                    <td>
                        <mat-form-field appearance="outline">
                            <mat-label>Postal Code</mat-label>
                            <input matInput maxlength="5" placeholder="Ex. 94105">
                        </mat-form-field>
                    </td>
                </tr>
            </table>
            <p>
                <mat-form-field appearance="outline" class="example-full-width">
                    <mat-label>Country</mat-label>
                    <textarea matInput placeholder="Ex. 100 Main St"></textarea>
                </mat-form-field>

                <mat-form-field appearance="outline" class="example-full-width">
                    <mat-label>Address</mat-label>
                    <textarea matInput placeholder="Ex. 100 Main St"></textarea>
                </mat-form-field>
            </p>

            <div class="buttons"> 
                 <button class="acceptBtn" color="primary" type="button">Accept Changes </button>
                <button class="cancelBtn" color="primary" type="button">Cancel Changes </button>
            </div>
        </form>
    </div>
</div>
