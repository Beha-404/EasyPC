<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="nav-bar.component.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">

<nav class="nav-bar">
    <ul class="navhome">
        <li><a mat-button routerLink="/home">EasyPCLogoPlaceHolder</a></li>
    </ul>
    @if (accountService.currentUser()) {
    <ul class="navcenter">
        <li><a mat-button routerLink="/products">Products</a></li>
        <li><a mat-button routerLink="/orders">Orders</a></li>
        <li><a mat-button routerLink="/support">Support</a></li>
    </ul>
    }
    <ul class="navright">
        @if (!accountService.currentUser()) {
        <li><a mat-button id="loginButton" (click)="openLoginForm()">Login</a></li>
        <li><a mat-button>Register</a></li>
        }
        @else {
        <li><a mat-button routerLink="/edit-profile">Edit profile</a></li>
        <li><a mat-button (click)="accountService.logout()">Logout</a></li>
        }
    </ul>
</nav>

<div class="loginForm-container" *ngIf="isLoginFormVisible">
    <div class="loginForm-content">
        <button class="close-button" aria-label="Close alert" type="button" data-close (click)="closeLoginForm()">
            <span aria-hidden="true">&times;</span>
        </button>
        <form #loginForm class="login" (ngSubmit)="login()">
            <h2>EasyPC</h2>
            <div class="loginForm-control">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" [(ngModel)]="body.username" required />
            </div>
            <div class="loginForm-control">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" [(ngModel)]="body.password" required />
            </div>
            <div *ngIf="errorMessage" class="error-message">
                {{errorMessage}}
            </div>
            <div class="loginForm-control-others">
                <button mat-button id="login" type="submit">Login</button>
            </div>
        </form>
    </div>
</div>
